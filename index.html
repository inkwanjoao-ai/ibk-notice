<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전산장애 안내 메시지 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #ef4444;
    --accent2: #f97316;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --green: #22c55e;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(239,68,68,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(239,68,68,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .header-text h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-top: 2px;
  }

  .badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  /* Main layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 640px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* Form elements */
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  textarea, input, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }
  textarea:focus, input:focus, select:focus {
    border-color: rgba(239,68,68,0.5);
    box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
  }
  textarea { min-height: 100px; line-height: 1.6; }

  select option { background: var(--surface); }

  .form-row {
    margin-bottom: 16px;
  }
  .form-row:last-child { margin-bottom: 0; }

  /* Severity selector */
  .severity-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sev-btn {
    flex: 1;
    min-width: 80px;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .sev-btn:hover { border-color: var(--accent); color: var(--text); }
  .sev-btn.active[data-sev="low"] { background: rgba(34,197,94,0.12); border-color: var(--green); color: var(--green); }
  .sev-btn.active[data-sev="medium"] { background: rgba(245,158,11,0.12); border-color: var(--amber); color: var(--amber); }
  .sev-btn.active[data-sev="high"] { background: rgba(249,115,22,0.12); border-color: var(--accent2); color: var(--accent2); }
  .sev-btn.active[data-sev="critical"] { background: rgba(239,68,68,0.12); border-color: var(--accent); color: var(--accent); }

  /* Channel chips */
  .channel-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ch-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .ch-chip:hover { border-color: var(--blue); color: var(--text); }
  .ch-chip.active { background: rgba(59,130,246,0.12); border-color: var(--blue); color: var(--blue); }

  /* Generate button */
  .generate-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }
  .generate-btn:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(239,68,68,0.3); }
  .generate-btn:active { transform: translateY(0); }
  .generate-btn.loading { pointer-events: none; opacity: 0.7; }

  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output area */
  .output-section {
    display: none;
  }
  .output-section.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .output-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 6px 16px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    font-weight: 500;
  }

  .tab-content {
    display: none;
  }
  .tab-content.active { display: block; }

  .message-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    line-height: 1.8;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: keep-all;
    min-height: 120px;
    position: relative;
  }

  .copy-btn {
    position: absolute;
    top: 12px; right: 12px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.18s;
  }
  .copy-btn:hover { border-color: var(--blue); color: var(--blue); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .meta-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.2);
    color: var(--blue);
    margin-bottom: 4px;
  }

  /* divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0 16px;
  }

  /* error */
  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
    margin-top: 12px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="status-dot"></div>
    <div class="header-text">
      <h1>전산장애 안내 메시지 생성기</h1>
      <p>IT INCIDENT NOTIFICATION GENERATOR · POWERED BY AI</p>
    </div>
    <div class="badge">● SYSTEM ALERT</div>
  </header>

  <!-- Input form -->
  <div class="main-grid">

    <!-- Left: 장애 정보 -->
    <div class="card">
      <div class="card-title">장애 정보 입력</div>

      <div class="form-row">
        <label>장애 내용 *</label>
        <textarea id="incidentDesc" placeholder="예: 인터넷뱅킹 로그인 오류, 결제 시스템 일시 중단, 앱 접속 불가 등"></textarea>
      </div>

      <div class="form-row">
        <label>복구 예정 시간 *</label>
        <input type="datetime-local" id="recoveryTime">
      </div>

      <div class="form-row">
        <label>장애 심각도</label>
        <div class="severity-group">
          <button class="sev-btn" data-sev="low">낮음</button>
          <button class="sev-btn active" data-sev="medium">보통</button>
          <button class="sev-btn" data-sev="high">높음</button>
          <button class="sev-btn" data-sev="critical">긴급</button>
        </div>
      </div>

      <div class="form-row">
        <label>영향 범위</label>
        <input type="text" id="affectedScope" placeholder="예: 전체 고객, 모바일 앱 사용자, 기업 고객">
      </div>
    </div>

    <!-- Right: 메시지 설정 -->
    <div class="card">
      <div class="card-title">메시지 설정</div>

      <div class="form-row">
        <label>발신 채널 (다중 선택)</label>
        <div class="channel-group">
          <button class="ch-chip active" data-ch="branch">🏦 영업점 단말</button>
          <button class="ch-chip active" data-ch="app">💻 비대면 채널 팝업</button>
          <button class="ch-chip" data-ch="sms_kakao">📱 SMS / 카카오톡</button>
          <button class="ch-chip" data-ch="web">🌐 홈페이지 공지</button>
        </div>
      </div>

      <div class="form-row">
        <label>서비스명</label>
        <input type="text" id="companyName" placeholder="예: i-ONE 뱅크, IBK BOX, 모바일브랜치">
      </div>

      <div class="form-row">
        <label>담당 부서</label>
        <input type="text" id="deptName" placeholder="예: 디지털추진팀, 개인디지털사업부, IT시스템운영부">
      </div>

      <div class="form-row">
        <label>사과 문구 <span style="font-weight:400;color:var(--text-muted)">(기본 포함)</span></label>
        <input type="text" id="apologyNote" placeholder="예: 이용에 불편을 드려 진심으로 죄송합니다." value="이용에 불편을 드려 진심으로 죄송합니다.">
      </div>

      <div class="form-row">
        <label>문의 연락처</label>
        <input type="text" id="contactInfo" placeholder="예: 고객센터 1588-2588" value="고객센터 1588-2588">
      </div>

      <div class="form-row">
        <label>메시지 톤</label>
        <select id="messageTone">
          <option value="formal">공식적 (공공기관/금융)</option>
          <option value="polite" selected>정중한 (일반 기업)</option>
          <option value="friendly">친근한 (IT 서비스/앱)</option>
        </select>
      </div>

      <button class="generate-btn" id="generateBtn">
        <span id="btnText">🚨 메시지 자동 생성</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- Output -->
  <div class="output-section" id="outputSection">
    <div class="card">
      <div class="output-header">
        <div class="card-title" style="margin-bottom:0">생성된 메시지</div>
        <span id="generatedAt" style="font-family:var(--mono);font-size:11px;color:var(--text-muted)"></span>
      </div>

      <div class="output-tabs" id="outputTabs"></div>

      <div id="outputContents"></div>
    </div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  function pad(n) { return String(n).padStart(2,'0'); }

  document.getElementById('generateBtn').addEventListener('click', generateMessages);

  // Severity select
  document.querySelectorAll('.sev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  // Channel chips
  document.querySelectorAll('.ch-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('active'));
  });

  // Set default recovery time (2 hours from now)
  const now = new Date();
  now.setHours(now.getHours() + 2);
  document.getElementById('recoveryTime').value =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

  function getSelectedChannels() {
    return [...document.querySelectorAll('.ch-chip.active')].map(c => c.dataset.ch);
  }

  function getSelectedSeverity() {
    return document.querySelector('.sev-btn.active')?.dataset.sev || 'medium';
  }

  function formatDateTime(dtStr) {
    if (!dtStr) return '미정';
    const d = new Date(dtStr);
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${pad(d.getHours())}시 ${pad(d.getMinutes())}분`;
  }

  const channelLabels = {
    branch: '🏦 영업점 단말',
    app: '💻 비대면 채널 팝업',
    sms_kakao: '📱 SMS / 카카오톡',
    web: '🌐 홈페이지 공지'
  };

  async function generateMessages() {
    const desc = document.getElementById('incidentDesc').value.trim();
    const recovery = document.getElementById('recoveryTime').value;
    const channels = getSelectedChannels();
    const severity = getSelectedSeverity();
    const company = '기업은행';
    const service = document.getElementById('companyName').value.trim();
    const dept = document.getElementById('deptName').value.trim();
    const apology = document.getElementById('apologyNote').value.trim() || '이용에 불편을 드려 진심으로 죄송합니다.';
    const contact = document.getElementById('contactInfo').value.trim();
    const tone = document.getElementById('messageTone').value;
    const errorEl = document.getElementById('errorMsg');

    errorEl.style.display = 'none';

    if (!desc) { showError('장애 내용을 입력해 주세요.'); return; }
    if (!recovery) { showError('복구 예정 시간을 입력해 주세요.'); return; }
    if (channels.length === 0) { showError('최소 1개 이상의 채널을 선택해 주세요.'); return; }

    // Loading state
    const btn = document.getElementById('generateBtn');
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';
    btn.classList.add('loading');

    const recoveryStr = formatDateTime(recovery);
    const sevMap = { low:'낮음(Low)', medium:'보통(Medium)', high:'높음(High)', critical:'긴급(Critical)' };
    const toneMap = { formal:'공식적이고 격식 있는 문체 (공공기관, 금융권 스타일)', polite:'정중하고 친절한 문체 (일반 기업 스타일)', friendly:'친근하고 간결한 문체 (IT 스비스, 스타트업 스타일)' };

    const channelSpecs = {
      branch: '영업점 단말 공지: 수신자는 은행 영업점 직원(행원)임. [단말공지] 제목으로 시작. 장애 시스템명, 장애 증상, 고객 응대 방법(대체 수단 안내 또는 양해 요청), 복구 예정 시간을 포함. 위에 제공된 사과 문구도 반드시 포함. 직원이 즉시 행동할 수 있도록 간결하고 명확하게, 200자 내외',
      sms_kakao: 'SMS/카카오톡 통합 문자: SMS(90바이트, 한글 45자 이내)와 카카오톡 알림톡(150자 이내) 두 가지 버전을 각각 작성. JSON 형식은 {"sms": "SMS 문자 내용", "kakao": "카카오톡 내용"} 으로 출력. SMS는 핵심만 초간결하게, 카카오톡은 이모지 활용하여 조금 더 상세하게',
      app: '비대면 채널 팝업: 인터넷뱅킹·모바일앱 등 비대면 채널 접속 시 노출되는 팝업 문구. 제목(20자 이내)과 본문(100자 이내)으로 분리. 고객이 즉시 상황을 파악할 수 있도록 간결하고 명확하게',
      web: '홈페이지 공지: [공지] 제목과 본문으로 구성, 상세하게 설명, 300자 내외'
    };

    const selectedSpecs = channels.map(ch => channelSpecs[ch]).join('\n');

    const prompt = `당신은 기업의 전산장애 고객 알림 메시지 전문 작성가입니다.

아래 정보를 바탕으로 각 채널별 대고객 알림 메시지를 작성하세요.

## 장애 정보
- 회사명: ${company}
- 서비스명: ${service || '미입력'}
- 담당 부서: ${dept || '미입력'}
- 장애 내용: ${desc}
- 복구 예정 시간: ${recoveryStr}
- 장애 심각도: ${sevMap[severity]}
- 영향 범위: ${document.getElementById('affectedScope').value || '해당 서비스 이용 고객'}
- 문의 연락처: ${contact || '고객센터 1588-2588'}
- 메시지 톤: ${toneMap[tone]}
- 사과 문구: ${apology}

## 작성할 채널 및 조건
${selectedSpecs}

## 출력 형식
반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만 출력하세요.
각 채널 key는 채널 코드(${channels.join(', ')})를 사용하세요.

{
  ${channels.map(ch => {
    if (ch === 'app') return `"app": {"title": "팝업 제목", "body": "팝업 본문"}`;
    if (ch === 'sms_kakao') return `"sms_kakao": {"sms": "SMS 문자 내용", "kakao": "카카오톡 내용"}`;
    return `"${ch}": "메시지 내용"`;
  }).join(',\n  ')}
}

주의사항:
- 모든 메시지(영업점 단말 포함)에 위에 제공된 사과 문구를 반드시 포함
- 담당 부서명이 있으면 메시지 말미에 발신 부서로 표기
- 정확한 복구 예정 시간 명시
- 각 채널의 글자 수 제한 엄수
- 영업점 단말 공지는 줄바꿈 포함 가능 (\\n 사용)
- 영업점 단말 공지는 수신자가 직원이므로 직원 행동 지침 중심으로 작성하되, 사과 문구는 포함`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': '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',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        const errMsg = data?.error?.message || `HTTP ${response.status}`;
        if (response.status === 401) throw new Error('API 키가 유효하지 않습니다. 키를 확인해 주세요.\n(' + errMsg + ')');
        if (response.status === 429) throw new Error('요청이 너무 많습니다. 잠시 후 다시 시도해 주세요.');
        throw new Error('API 오류: ' + errMsg);
      }

      if (!data.content || !Array.isArray(data.content)) {
        throw new Error('API 응답 형식 오류: ' + JSON.stringify(data));
      }

      const rawText = data.content.map(i => i.text || '').join('');
      const clean = rawText.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderOutput(parsed, channels);

    } catch (err) {
      showError('오류가 발생했습니다.\n' + err.message);
    } finally {
      document.getElementById('btnText').style.display = 'inline';
      document.getElementById('spinner').style.display = 'none';
      btn.classList.remove('loading');
    }
  }

  function renderOutput(data, channels) {
    const section = document.getElementById('outputSection');
    const tabs = document.getElementById('outputTabs');
    const contents = document.getElementById('outputContents');

    tabs.innerHTML = '';
    contents.innerHTML = '';

    const now = new Date();
    document.getElementById('generatedAt').textContent =
      `생성: ${now.getHours()}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    channels.forEach((ch, i) => {
      const tabBtn = document.createElement('button');
      tabBtn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      tabBtn.textContent = channelLabels[ch];
      tabBtn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tabBtn.classList.add('active');
        document.getElementById('tab-' + ch).classList.add('active');
      };
      tabs.appendChild(tabBtn);

      const content = document.createElement('div');
      content.className = 'tab-content' + (i === 0 ? ' active' : '');
      content.id = 'tab-' + ch;

      let html = '';

      if (ch === 'app' && typeof data[ch] === 'object') {
        // 비대면 채널 팝업 - 제목/본문
        html += `<div class="message-box">`;
        html += `<button class="copy-btn" onclick="copyMsg(this, '${ch}-all')">복사</button>`;
        html += `<div style="margin-bottom:12px">`;
        html += `<div class="meta-tag">제목</div><br>`;
        html += `<strong style="font-size:15px">${escHtml(data[ch].title || '')}</strong>`;
        html += `</div>`;
        html += `<div class="divider"></div>`;
        html += `<div class="meta-tag">본문</div><br>`;
        html += escHtml(data[ch].body || '').replace(/\\n/g, '<br>');
        html += `</div>`;
        html += `<div id="copy-${ch}-all" style="display:none">${escHtml(data[ch].title + '\n' + data[ch].body)}</div>`;
      } else if (ch === 'sms_kakao' && typeof data[ch] === 'object') {
        // SMS - 카카오톡 분리 표시
        const sms = data[ch].sms || '';
        const kakao = data[ch].kakao || '';
        html += `<div class="message-box" style="margin-bottom:12px">`;
        html += `<button class="copy-btn" onclick="copyMsg(this, 'sms-text')">복사</button>`;
        html += `<div class="meta-tag">SMS</div><br>`;
        html += `<div id="copy-sms-text" style="display:none">${escHtml(sms)}</div>`;
        html += escHtml(sms).replace(/\\n/g, '<br>');
        html += `</div>`;
        const smsBytes = new TextEncoder().encode(sms).length;
        html += `<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-bottom:14px">${sms.length}자 · ${smsBytes}바이트</div>`;
        html += `<div class="message-box">`;
        html += `<button class="copy-btn" onclick="copyMsg(this, 'kakao-text')">복사</button>`;
        html += `<div class="meta-tag">카카오톡</div><br>`;
        html += `<div id="copy-kakao-text" style="display:none">${escHtml(kakao)}</div>`;
        html += escHtml(kakao).replace(/\\n/g, '<br>');
        html += `</div>`;
        const kakaoBytes = new TextEncoder().encode(kakao).length;
        html += `<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:8px">${kakao.length}자 · ${kakaoBytes}바이트</div>`;
      } else {
        const msg = typeof data[ch] === 'string' ? data[ch] : JSON.stringify(data[ch]);
        html += `<div class="message-box">`;
        html += `<button class="copy-btn" onclick="copyMsg(this, '${ch}-text')">복사</button>`;
        html += `<div id="copy-${ch}-text" style="display:none">${escHtml(msg)}</div>`;
        html += escHtml(msg).replace(/\\n/g, '<br>');
        html += `</div>`;
        const rawMsg = typeof data[ch] === 'string' ? data[ch] : '';
        const byteLen = new TextEncoder().encode(rawMsg).length;
        html += `<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:8px">${rawMsg.length}자 · ${byteLen}바이트</div>`;
      }

      // char count for app
      if (ch === 'app' && typeof data[ch] === 'object') {
        const rawMsg = (data[ch].title || '') + (data[ch].body || '');
        const byteLen = new TextEncoder().encode(rawMsg).length;
        html += `<div style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--text-muted);margin-top:8px">${rawMsg.length}자 · ${byteLen}바이트</div>`;
      }

      content.innerHTML = html;
      contents.appendChild(content);
    });

    section.classList.add('visible');
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function copyMsg(btn, id) {
    const el = document.getElementById('copy-' + id);
    const text = el ? el.textContent : btn.closest('.message-box').innerText.replace('복사','').trim();
    navigator.clipboard.writeText(text.replace(/\\n/g, '\n')).then(() => {
      btn.textContent = '✓ 복사됨';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

}); // DOMContentLoaded
</script>
